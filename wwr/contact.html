<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <meta name="description"
      content="Here you can find the information nedded to find us in maps and contact us through phone calls, email, or messages.">
    <meta name="author" content="Jose Cruz">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Whitewater Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="information">
            <h1>White Water Rafting Company</h1>

            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </div>
        <div class="container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d124038.66871073497!2d-121.88866495103059!3d38.068999391379016!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2smx!4v1775885168435!5m2!1ses-419!2smx"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="contact_us">
                <form action="post">
                    <div class="personal_details">
                        <div>
                            <label for="name">Name</label>
                            <input type="text" name="name" id="name" placeholder="peter parker">
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email"
                              placeholder="peterp@outlook.com" required>
                        </div>
                    </div>
                    <div class="radio">
                        <p>Message Purpose</p>
                        <div class="radio_option">
                            <div>
                                <input type="radio" name="General_inquiry" id="General_inquiry">
                                <label for="General_inquiry">General Inquiry</label>
                            </div>
                            <div>
                                <input type="radio" name="General_inquiry"
                                  id="Reservation_question">
                                <label for="Reservation_question">Reservation Question</label>
                            </div>
                            <div>
                                <input type="radio" name="General_inquiry" id="Website_suggestion">
                                <label for="Website_suggestion">Website Suggestion</label>
                            </div>
                        </div>
                    </div>
                    <div class="message_purpose">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" rows="4"
                          placeholder="Type here..."></textarea>
                    </div>
                    <div class="subscribe">
                        <input type="checkbox" name="subscribe" id="subscribe">
                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    </div>
                    <button class="submit_button" type="submit">Get in Touch!</button>
                </form>

            </div>
        </div>


        <section>
            <div class="serve_title">
                <h2>We Are Here to Serve You.</h2>
            </div>
            <div class="serve_flex">
                <figure>
                    <img src="images/information.jpg" alt="Information | Pablo">
                    <figcaption>Information Pablo</figcaption>
                </figure>
                <figure>
                    <img src="images/reservations.jpg" alt="Reservations | Jessica">
                    <figcaption>Reservations Jessica</figcaption>
                </figure>
                <figure>
                    <img src="images/refunds.jpg" alt="Refunds | Kelly">
                    <figcaption>Refunds Kelly</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>©️2026 | Whitewater Rafting | Jose Cruz</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Logo" width="70">
            </a>
            <a href="https://linkedin.com">
                <img src="images/link.jpg" alt="Linkedin Logo" width="70">
            </a>
            <a href="https://instagram.com">
                <img src="images/insta.jpg" alt="Instagram Logo" width="70">
            </a>
        </nav>
    </footer>

</body>

</html>
